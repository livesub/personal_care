<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="Personal Care - 방문요양 매칭 관리 시스템">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Personal Care">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Personal Care</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Flutter 로드 전에 해시 URL을 path로 치환 → 주소창에 # 없이 동작 -->
  <script>
    (function() {
      var hash = location.hash;
      if (hash && hash.indexOf('#/') === 0) {
        var path = hash.substring(1);
        location.replace(location.origin + path + location.search);
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
